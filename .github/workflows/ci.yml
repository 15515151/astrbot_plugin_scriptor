name: CI/CD with Web UI Build

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run all tests
      run: |
        echo "Running all tests..."
        pytest tests/ -v --tb=short --ignore=tests/test_performance.py
        echo "Running learning mode tests..."
        pytest tests/test_learning_manager.py -v --tb=short
        echo "Running learning manager import tests..."
        pytest tests/test_learning_manager_import.py -v --tb=short
        echo "Running learning workflow integration tests..."
        pytest tests/integration/test_learning_workflow.py -v --tb=short
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-python${{ matrix.python-version }}
        path: |
          test-results.xml
          .pytest_cache/

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Run flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run black (check only)
      run: |
        black --check .
    
    - name: Run isort (check only)
      run: |
        isort --check-only .

  build-web:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
    
    - name: Install Node dependencies
      run: |
        cd web
        npm ci
    
    - name: Build Web UI
      run: |
        cd web
        npm run build
    
    - name: Verify build
      run: |
        ls -la web/dist
        echo "Web UI 构建成功！"
    
    - name: Upload Web UI artifacts
      uses: actions/upload-artifact@v3
      with:
        name: web-dist
        path: web/dist/
        retention-days: 7

  build-package:
    runs-on: ubuntu-latest
    needs: [test, lint, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Download Web UI artifacts
      uses: actions/download-artifact@v3
      with:
        name: web-dist
        path: web/dist
    
    - name: Set up Node.js (for build hook)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build hatchling
    
    - name: Build Python package with Web UI
      env:
        ASTRBOT_BUILD_WEB: "1"
      run: |
        python -m build
    
    - name: Upload Python package
      uses: actions/upload-artifact@v3
      with:
        name: python-package
        path: dist/

  release:
    runs-on: ubuntu-latest
    needs: [build-package]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download Python package
      uses: actions/download-artifact@v3
      with:
        name: python-package
        path: dist/
    
    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dist/*.whl,dist/*.tar.gz"
        token: ${{ secrets.GITHUB_TOKEN }}
        generateReleaseNotes: true
    
    - name: Publish to PyPI
      env:
        PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      run: |
        python -m pip install twine
        python -m twine upload dist/* --username __token__ --password $PYPI_TOKEN
